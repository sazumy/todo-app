<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      color: #1a1a2e;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a52d5; }
    .input-row button:active { transform: scale(0.97); }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      color: #6c63ff;
      background: #f0eeff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      border: 2px solid transparent;
      transition: border-color 0.2s, opacity 0.2s;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done { opacity: 0.5; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1a1a2e;
      word-break: break-word;
      outline: none;
      background: transparent;
      border: none;
      font-family: inherit;
      cursor: text;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #94a3b8;
      padding: 0 2px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .clear-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #cbd5e1;
      font-size: 0.9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>TODO</h1>

  <div class="input-row">
    <input id="newTodo" type="text" placeholder="新しいタスクを入力..." autocomplete="off">
    <button onclick="addTodo()">追加</button>
  </div>

  <div class="filters">
    <button id="filter-all"       class="active" onclick="setFilter('all')">すべて</button>
    <button id="filter-active"              onclick="setFilter('active')">未完了</button>
    <button id="filter-completed"           onclick="setFilter('completed')">完了済み</button>
  </div>

  <div class="todo-list" id="todoList"></div>

  <div class="footer">
    <span id="countLabel"></span>
    <button class="clear-btn" onclick="clearCompleted()">完了済みを削除</button>
  </div>
</div>

<script>
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  function render() {
    const list = document.getElementById('todoList');
    const filtered = todos.filter(t =>
      filter === 'all'       ? true :
      filter === 'active'    ? !t.done :
                               t.done
    );

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">タスクがありません</div>';
    } else {
      list.innerHTML = filtered.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle('${t.id}')">
          <span class="todo-text" contenteditable="true"
            onblur="editText('${t.id}', this.textContent)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
          >${escHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTodo('${t.id}')">&#x2715;</button>
        </div>
      `).join('');
    }

    const active = todos.filter(t => !t.done).length;
    document.getElementById('countLabel').textContent =
      `残り ${active} 件 / 全 ${todos.length} 件`;

    ['all', 'active', 'completed'].forEach(f => {
      document.getElementById('filter-' + f).classList.toggle('active', f === filter);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTodo() {
    const input = document.getElementById('newTodo');
    const text = input.value.trim();
    if (!text) return;
    todos.unshift({ id: Date.now().toString(), text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function editText(id, text) {
    const trimmed = text.trim();
    const t = todos.find(t => t.id === id);
    if (t && trimmed) { t.text = trimmed; save(); }
    else if (t && !trimmed) { render(); } // revert empty edit
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    render();
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.done);
    save();
    render();
  }

  document.getElementById('newTodo').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  render();
</script>
</body>
</html>
